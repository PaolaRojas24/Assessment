lane_follower_q:
  ros__parameters:
    platform: qcar
    target_point_topic: /lane_target_point_m
    cmd_topic: /qcar_sim/user_command

    wheelbase: 0.256

    # Dynamic lookahead (meters):
    # Ld = clamp(lookahead_base + lookahead_speed_gain * |v_cmd|, lookahead_min, lookahead_max)
    lookahead_min: 0.16
    lookahead_max: 0.34
    lookahead_base: 0.20
    lookahead_speed_gain: 0.80

    max_steering_angle: 0.50
    curve_threshold: 0.20

    speed_straight: 0.15
    speed_curve: 0.0775

    # Use -1.0 if your steering sign must be inverted.
    steering_sign: -1.0
