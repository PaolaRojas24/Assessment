lane_detector:
  ros__parameters:
    # Input image topic consumed by lane_detector node
    subscribe_topic: /qcar_sim/csi_front/image_raw
    target_point_topic: /lane_target_point_m

    # BEV resolution: pixels that represent 1 meter.
    # Larger value => more detail and larger BEV image.
    # Smaller value => less detail and faster processing.
    bev_pixels_per_meter: 3000.0

    # Destination BEV quadrilateral in meters (x, y) flattened as:
    # [x0, y0, x1, y1, x2, y2, x3, y3]
    bev_dst_points_m:
      - 0.0
      - 0.103908
      - 0.0
      - 0.0
      - 0.309683
      - 0.0
      - 0.309683
      - 0.103908

    # Source ROI polygon in input image pixels (x, y), flattened as:
    # [x0, y0, x1, y1, x2, y2, x3, y3]
    roi_polygon_points_px:
      - 0.0
      - 480.0
      - 240.0
      - 280.0
      - 390.0
      - 280.0
      - 640.0
      - 480.0

    # Rear axle target conversion parameters.
    # target_y_rear = target_y_camera + camera_to_rear_axle_forward_m
    # target_x_rear = target_x_camera + camera_to_rear_axle_lateral_m
    camera_to_rear_axle_forward_m: 0.323
    camera_to_rear_axle_lateral_m: 0.0

    # Used when only one lane is visible to estimate centerline in image space.
    lane_half_width_px: 50.0

    # EMA smoothing factor for dynamic lane half-width estimation (0.1–0.3 recommended).
    lane_half_width_ema_alpha: 0.2

    # Lateral target bias within the lane.
    # 0.0 = lane center (default)
    # 0.5 = halfway between center and left line (recommended for left-biased driving)
    # 0.9 = very close to the left line (max safe value)
    # Negative values bias toward the right line.
    lane_lateral_bias: 0.15
